name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test ${{ matrix.os }} Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, python-version: "3.10" }
          - { os: ubuntu-latest, python-version: "3.11" }
          - { os: ubuntu-latest, python-version: "3.12" }
          - { os: ubuntu-latest, python-version: "3.13" }
          - { os: windows-latest, python-version: "3.12" }
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv run --extra test --extra complete --extra sparse pytest dask_array/tests/ -q

  test-frisky-rust:
    name: Test Frisky Rust path
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Install test environment
        run: uv sync --extra test --extra complete --extra sparse --group dev
      - name: Install Frisky
        # Exercise the latest published Frisky against this explicit Dask-era stack.
        run: uv pip install frisky "dask==2026.3.0" "numpy==2.4.6" "xarray==2026.4.0"
      - name: Build dask-array Rust extension
        run: MATURIN_IMPORT_HOOK_ENABLED=0 .venv/bin/python -m maturin develop --release
      - name: Check native Frisky layer
        run: |
          .venv/bin/python - <<'PY'
          import dask_array as da
          import dask_array._rust as rust
          from dask_array._frisky.base import _NATIVE_BUILD_GENERATION
          import frisky

          assert rust.NATIVE_BUILD_GENERATION == _NATIVE_BUILD_GENERATION
          assert rust.native_build_generation() == _NATIVE_BUILD_GENERATION
          x = da.arange(12, chunks=4) + 1
          layer = x.expr.simplify().lower_completely()._frisky_layer()
          assert type(layer).__name__ == "BlockwiseLayer"
          assert type(layer._rust).__module__ == "builtins"
          assert layer.to_task_records()
          print("frisky", getattr(frisky, "__version__", "unknown"))
          print("native build generation", _NATIVE_BUILD_GENERATION)
          PY
      - name: Test with Frisky scheduler
        run: |
          .venv/bin/python -m pytest dask_array/tests/ --scheduler=frisky -q \
            --deselect dask_array/tests/test_reductions.py::test_weighted_reduction \
            --deselect dask_array/tests/test_slice_pushdown.py::test_masked_array \
            --deselect dask_array/tests/test_slicing.py::test_slice_masked_arrays
