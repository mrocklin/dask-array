name: Publish to PyPI

# Tag push (x.y.z) → build everything, smoke-test, publish to PyPI.
# Manual run (workflow_dispatch) → build everything + smoke-test, but DO NOT
# publish. Use it as a build-only trial to confirm the native-wheel matrix is
# green before cutting a real release tag.
on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-pure:
    name: Build pure-Python sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Check tag version
        if: github.ref_type == 'tag'
        run: |
          tag_version="$GITHUB_REF_NAME"
          if [[ ! "$tag_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Release tags must use x.x.x form, got $tag_version"
              exit 1
          fi
      # hatch-vcs derives the version from the git tag; the universal py3-none-any
      # wheel + sdist are the pure-Python fallback for platforms without a native
      # wheel (and the sdist builds with no Rust toolchain).
      - run: uv build --sdist --wheel
      - name: Check pure version matches tag
        if: github.ref_type == 'tag'
        run: |
          python - <<'PY'
          import email, glob, os, tarfile, zipfile

          tag_version = os.environ["GITHUB_REF_NAME"]
          (wheel_path,) = glob.glob("dist/*.whl")
          (sdist_path,) = glob.glob("dist/*.tar.gz")

          with zipfile.ZipFile(wheel_path) as wheel:
              meta = next(n for n in wheel.namelist() if n.endswith(".dist-info/METADATA"))
              wheel_version = email.message_from_bytes(wheel.read(meta))["Version"]
          with tarfile.open(sdist_path, "r:gz") as sdist:
              pkg_info = next(n for n in sdist.getnames() if n.endswith("/PKG-INFO"))
              sdist_version = email.message_from_binary_file(sdist.extractfile(pkg_info))["Version"]

          for artifact, version in {"wheel": wheel_version, "sdist": sdist_version}.items():
              if version != tag_version:
                  raise SystemExit(f"{artifact} version {version} does not match tag {tag_version}")
          PY
      - run: uvx twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist-pure
          path: dist/*
          if-no-files-found: error

  build-native:
    name: Build native wheel (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu }
          - { os: macos-14, target: aarch64-apple-darwin }
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # maturin reads the version from [project] version (static) and otherwise
      # falls back to the Cargo crate version — it does NOT understand hatch-vcs.
      # On a release tag, stamp the tag version so the native wheels match the
      # pure-Python wheel/sdist. On a manual trial run there is no tag; leave the
      # version dynamic (maturin uses the Cargo version) since we don't publish.
      - name: Stamp release version
        if: github.ref_type == 'tag'
        run: |
          python3 - "$GITHUB_REF_NAME" <<'PY'
          import re, sys, pathlib
          version = sys.argv[1]
          p = pathlib.Path("pyproject.toml")
          text, n = re.subn(r'^dynamic = \["version"\]\s*$', f'version = "{version}"', p.read_text(), count=1, flags=re.M)
          if n != 1:
              raise SystemExit('could not find `dynamic = ["version"]` to stamp')
          p.write_text(text)
          print(f"stamped version = {version}")
          PY
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # abi3 (Cargo: abi3-py310) → one wheel per platform covers Python >= 3.10.
          # manylinux is consulted only for linux targets; ignored on macOS.
          args: --release --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v7
        with:
          name: dist-native-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  smoke-test:
    name: Smoke-test distributions on Python ${{ matrix.python-version }}
    needs: [build-pure, build-native]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v8.2.0
      - uses: actions/download-artifact@v7
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      # Install the native linux x86_64 wheel by path (deps resolve from PyPI),
      # so the native extension must be present. The glob matches manylinux
      # (*linux*x86_64*).
      - run: uv venv --python ${{ matrix.python-version }} .venv
      - run: |
          wheel=$(ls dist/dask_array-*-*linux*x86_64*.whl)
          echo "installing $wheel"
          uv pip install --python .venv/bin/python "$wheel"
      - run: |
          .venv/bin/python - <<'PY'
          import dask_array as da, dask_array._rust  # native wheel must ship _rust
          x = da.ones((4, 4), chunks=(2, 2))
          assert x.sum().compute() == 16
          print("native wheel OK")
          PY
      # The sdist builds pure-Python (no Rust toolchain); _rust must be absent and
      # the dask path must still work.
      - run: uv venv --python ${{ matrix.python-version }} .venv-sdist
      - run: uv pip install --python .venv-sdist/bin/python dist/*.tar.gz
      - run: |
          .venv-sdist/bin/python - <<'PY'
          import importlib.util
          import dask_array as da
          assert importlib.util.find_spec("dask_array._rust") is None, "sdist must be pure-Python"
          x = da.ones((4, 4), chunks=(2, 2))
          assert x.sum().compute() == 16
          print("pure-Python sdist OK")
          PY

  publish:
    name: Publish distributions
    needs: smoke-test
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/dask-array/
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - name: Check all artifact versions match tag
        run: |
          python3 - "$GITHUB_REF_NAME" <<'PY'
          import os, sys, pathlib
          tag = sys.argv[1]
          bad = []
          for f in sorted(pathlib.Path("dist").iterdir()):
              name = f.name
              if name.endswith(".whl"):
                  version = name.split("-")[1]
              elif name.endswith(".tar.gz"):
                  version = name[: -len(".tar.gz")].split("-", 1)[1]
              else:
                  continue
              if version != tag:
                  bad.append(f"{name}: {version}")
          if bad:
              raise SystemExit("artifacts do not match tag %s:\n  %s" % (tag, "\n  ".join(bad)))
          print("all artifacts match", tag)
          PY
      - run: pipx run twine check dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1
